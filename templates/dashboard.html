<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | MedAlert AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand">
      <span class="logo">🩺</span>
      <span class="brand-name">MedAlert AI</span>
    </div>
<div class="nav-search">
  <input
    type="text"
    id="placeInput"
    placeholder="Enter place (e.g., Hyderabad)"
  /><button onclick="getHospitalsByLiveLocation()">Use My Location</button>

  <button onclick="searchHospitalsByPlace()">Search</button>
</div>


    <a href="{{ url_for('logout') }}" class="btn-secondary">Logout</a>
  </div>
</header>

<main class="section">

  <h2>Disease Prediction Modules</h2>
  <p class="section-help">
    Select a disease prediction module to begin health risk assessment.
  </p>

  <!-- DASHBOARD GRID -->
  <div class="dashboard-grid">

    <a href="{{ url_for('diabetesPage') }}" class="card module">
      <div class="module-icon">🩸</div>
      <div class="module-title">Diabetes Risk Assessment</div>
    </a>

    <a href="{{ url_for('cancerPage') }}" class="card module">
      <div class="module-icon">🎗️</div>
      <div class="module-title">Breast Cancer Screening</div>
    </a>

    <a href="{{ url_for('heartPage') }}" class="card module">
      <div class="module-icon">❤️</div>
      <div class="module-title">Heart Disease Prediction</div>
    </a>

    <a href="{{ url_for('kidneyPage') }}" class="card module">
      <div class="module-icon">🧪</div>
      <div class="module-title">Kidney Disease Detection</div>
    </a>

    <a href="{{ url_for('liverPage') }}" class="card module">
      <div class="module-icon">🧬</div>
      <div class="module-title">Liver Disease Prediction</div>
    </a>

  </div>
</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  © 2025 MedAlert AI • Dashboard
</footer>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
