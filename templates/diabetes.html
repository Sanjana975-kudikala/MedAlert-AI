<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabetes Prediction | MedAlert AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <style>
    .error-msg {
      color: #d93025;
      font-size: 0.8rem;
      margin-top: 4px;
      display: none;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand">
      <span class="logo">🩺</span>
      <span class="brand-name">MedAlert AI</span>
    </div>

    <nav class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="/diabetes" class="active">Diabetes</a>
      <a href="/cancer">Breast Cancer</a>
      <a href="/heart">Heart</a>
      <a href="/kidney">Kidney</a>
      <a href="/liver">Liver</a>
    </nav>

    <a href="{{ url_for('dashboard') }}" class="btn-primary">Dashboard</a>
  </div>
</header>

<main class="page">
  <div class="page-inner">
    <section class="card">
      <div class="card-header">
        <h1>Diabetes Risk Prediction</h1>
        <p class="section-help">
          Provide patient clinical parameters to estimate diabetes risk.
        </p>
      </div>

      <!-- 🔽 UPDATED ACTION HERE -->
      <form class="form-grid"
            method="POST"
            action="/diabetes/predict"
            onsubmit="return validateForm()">

        <label class="form-field">
          <span>Fasting Plasma Glucose (mg/dL)</span>
          <input type="number" id="fbg" name="fbg">
          <div class="error-msg" id="fbgError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>HbA1c (%)</span>
          <input type="number" step="0.1" id="hba1c" name="hba1c">
          <div class="error-msg" id="hba1cError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Post Prandial Plasma Glucose (mg/dL)</span>
          <input type="number" id="rbs" name="rbs">
          <div class="error-msg" id="rbsError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Blood Pressure (mmHg)</span>
          <input type="text" id="bp" name="blood_pressure" placeholder="120/80">
          <div class="error-msg" id="bpError">Enter valid BP (e.g. 120/80)</div>
        </label>

        <!-- Height -->
        <label class="form-field">
          <span>Height (cm)</span>
          <input type="number" id="height" oninput="calculateBMI()">
          <div class="error-msg" id="heightError">Must be greater than 0</div>
        </label>

        <!-- Weight -->
        <label class="form-field">
          <span>Weight (kg)</span>
          <input type="number" id="weight" oninput="calculateBMI()">
          <div class="error-msg" id="weightError">Must be greater than 0</div>
        </label>

        <!-- Auto BMI -->
        <label class="form-field">
          <span>Body Mass Index (BMI)</span>
          <input type="number" step="0.1" id="bmi" name="bmi" readonly>
        </label>

        <label class="form-field">
          <span>Age (years)</span>
          <input type="number" id="age" name="age">
          <div class="error-msg" id="ageError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Family History of Diabetes</span>
          <div class="radio-group">
            <label><input type="radio" name="family_history" value="1"> Yes</label>
            <label><input type="radio" name="family_history" value="0"> No</label>
          </div>
          <div class="error-msg" id="familyError">Please select an option</div>
        </label>

        <label class="form-field">
          <span>Number of Pregnancies</span>
          <input type="number" id="pregnancies" name="pregnancies" min="0">
          <div class="error-msg" id="pregError">Value cannot be negative</div>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn-primary">
            Predict Diabetes Risk
          </button>
        </div>

      </form>
    </section>
  </div>
</main>

<footer class="footer">
  © 2025 MedAlert AI • Diabetes Prediction Module
</footer>

<script>
function calculateBMI() {
  const height = document.getElementById("height").value;
  const weight = document.getElementById("weight").value;

  if (height > 0 && weight > 0) {
    const heightM = height / 100;
    const bmi = (weight / (heightM * heightM)).toFixed(1);
    document.getElementById("bmi").value = bmi;
  } else {
    document.getElementById("bmi").value = "";
  }
}

function validateForm() {
  let valid = true;

  function check(id, err) {
    const v = document.getElementById(id).value;
    if (v === "" || v < 0) {
      document.getElementById(err).style.display = "block";
      valid = false;
    } else {
      document.getElementById(err).style.display = "none";
    }
  }

  check("fbg","fbgError");
  check("hba1c","hba1cError");
  check("rbs","rbsError");
  check("age","ageError");
  check("pregnancies","pregError");

  const bp = document.getElementById("bp").value;
  if (!/^\d{2,3}\/\d{2,3}$/.test(bp)) {
    document.getElementById("bpError").style.display = "block";
    valid = false;
  } else {
    document.getElementById("bpError").style.display = "none";
  }

  if (!document.querySelector('input[name="family_history"]:checked')) {
    document.getElementById("familyError").style.display = "block";
    valid = false;
  } else {
    document.getElementById("familyError").style.display = "none";
  }

  return valid;
}
</script>

</body>
</html>
