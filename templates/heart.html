<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Disease Prediction | MedAlert AI</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
    .error-msg { color: #d93025; font-size: 0.8rem; margin-top: 4px; display: none; }
    .radio-group { display: flex; gap: 20px; margin-top: 6px; }
  </style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand">
      <span class="logo">❤️</span>
      <span class="brand-name">MedAlert AI</span>
    </div>

    <nav class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="/diabetes">Diabetes</a>
      <a href="/cancer">Breast Cancer</a>
      <a href="/heart" class="active">Heart</a>
      <a href="/kidney">Kidney</a>
      <a href="/liver">Liver</a>
    </nav>

    <a href="{{ url_for('dashboard') }}" class="btn-primary">Dashboard</a>
  </div>
</header>

<main class="page">
  <div class="page-inner">
    <section class="card">
      <div class="card-header">
        <h1>Heart Disease Risk Prediction</h1>
        <p class="section-help">Provide patient parameters to estimate heart disease risk.</p>
      </div>

      <form class="form-grid" method="POST" action="/heart/predict" onsubmit="return validateForm()">

        <label class="form-field">
          <span>Age (years)</span>
          <input type="number" id="age" name="age">
          <div class="error-msg" id="ageError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Sex</span>
          <div class="radio-group">
            <label><input type="radio" name="sex" value="1"> Male</label>
            <label><input type="radio" name="sex" value="0"> Female</label>
          </div>
          <div class="error-msg" id="sexError">Please select an option</div>
        </label>

        <label class="form-field">
          <span>Systolic Blood Pressure (mmHg)</span>
          <input type="number" id="systolic" name="systolic">
          <div class="error-msg" id="sysError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Diastolic Blood Pressure (mmHg)</span>
          <input type="number" id="diastolic" name="diastolic">
          <div class="error-msg" id="diaError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Cholesterol (mg/dL)</span>
          <input type="number" id="cholesterol" name="cholesterol">
          <div class="error-msg" id="cholError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>HDL (mg/dL)</span>
          <input type="number" id="hdl" name="hdl">
          <div class="error-msg" id="hdlError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>LDL (mg/dL)</span>
          <input type="number" id="ldl" name="ldl">
          <div class="error-msg" id="ldlError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Triglycerides (mg/dL)</span>
          <input type="number" id="triglycerides" name="triglycerides">
          <div class="error-msg" id="triError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Blood Sugar (mg/dL)</span>
          <input type="number" id="blood_sugar" name="blood_sugar">
          <div class="error-msg" id="bsError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Body Mass Index (BMI)</span>
          <input type="number" step="0.1" id="bmi" name="bmi">
          <div class="error-msg" id="bmiError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Resting Heart Rate (bpm)</span>
          <input type="number" id="hr" name="hr">
          <div class="error-msg" id="hrError">Value cannot be negative</div>
        </label>

        <label class="form-field">
          <span>Family History of Heart Disease</span>
          <div class="radio-group">
            <label><input type="radio" name="family_history" value="1"> Yes</label>
            <label><input type="radio" name="family_history" value="0"> No</label>
          </div>
          <div class="error-msg" id="famError">Please select an option</div>
        </label>

        <label class="form-field">
          <span>Smoking (Yes/No)</span>
          <div class="radio-group">
            <label><input type="radio" name="smoking" value="1"> Yes</label>
            <label><input type="radio" name="smoking" value="0"> No</label>
          </div>
          <div class="error-msg" id="smokeError">Please select an option</div>
        </label>

        <label class="form-field">
          <span>Diabetes (Yes/No)</span>
          <div class="radio-group">
            <label><input type="radio" name="diabetes" value="1"> Yes</label>
            <label><input type="radio" name="diabetes" value="0"> No</label>
          </div>
          <div class="error-msg" id="diaCheckError">Please select an option</div>
        </label>

        <label class="form-field">
          <span>Exercise-induced Chest Pain</span>
          <div class="radio-group">
            <label><input type="radio" name="exercise_cp" value="1"> Yes</label>
            <label><input type="radio" name="exercise_cp" value="0"> No</label>
          </div>
          <div class="error-msg" id="excpError">Please select an option</div>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Predict Heart Disease Risk</button>
        </div>
      </form>

    </section>
  </div>
</main>

<footer class="footer">
  © 2025 MedAlert AI • Heart Disease Prediction Module
</footer>

<script>
function validateForm() {
  let valid = true;

  function checkNumber(id, err) {
    const val = document.getElementById(id).value;
    if (val === "" || val < 0) {
      document.getElementById(err).style.display = "block";
      valid = false;
    } else {
      document.getElementById(err).style.display = "none";
    }
  }

  const numberFields = [
    ["age", "ageError"],
    ["systolic", "sysError"],
    ["diastolic", "diaError"],
    ["cholesterol", "cholError"],
    ["hdl", "hdlError"],
    ["ldl", "ldlError"],
    ["triglycerides", "triError"],
    ["blood_sugar", "bsError"],
    ["bmi", "bmiError"],
    ["hr", "hrError"]
  ];

  numberFields.forEach(f => checkNumber(f[0], f[1]));

  function checkRadio(name, err) {
    if (!document.querySelector(`input[name="${name}"]:checked`)) {
      document.getElementById(err).style.display = "block";
      valid = false;
    } else {
      document.getElementById(err).style.display = "none";
    }
  }

  const radioFields = [
    ["sex", "sexError"],
    ["family_history", "famError"],
    ["smoking", "smokeError"],
    ["diabetes", "diaCheckError"],
    ["exercise_cp", "excpError"]
  ];

  radioFields.forEach(f => checkRadio(f[0], f[1]));

  return valid;
}
</script>

</body>
</html>
