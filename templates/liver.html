<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liver Disease Prediction | MedAlert AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand">
      <span class="logo">🧬</span>
      <span class="brand-name">MedAlert AI</span>
    </div>

    <nav class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="/diabetes">Diabetes</a>
      <a href="/cancer">Breast Cancer</a>
      <a href="/heart">Heart</a>
      <a href="/kidney">Kidney</a>
      <a href="/liver" class="active">Liver</a>
    </nav>

    <a href="{{ url_for('dashboard') }}" class="btn-primary">Dashboard</a>
  </div>
</header>

<main class="page">
  <div class="page-inner">

    <section class="card">
      <div class="card-header">
        <h1>Liver Disease Prediction</h1>
        <p class="section-help">
          Enter liver function test parameters to assess the risk of liver
          disease using machine learning models.
        </p>
      </div>

      <form class="form-grid" method="POST" action="/liver/predict">
        <label class="form-field">
          <span>Age (years)</span>
          <input type="number" name="age" required>
        </label>
        <label class="form-field">
          <span>Total Bilirubin (mg/dL)</span>
          <input type="number" step="0.1" name="total_bilirubin" required>
        </label>
        <label class="form-field">
          <span>Direct Bilirubin (mg/dL)</span>
          <input type="number" step="0.1" name="direct_bilirubin" required>
        </label>
        <label class="form-field">
          <span>Alkaline Phosphatase (IU/L)</span>
          <input type="number" name="alkphos" required>
        </label>
        <label class="form-field">
          <span>SGPT (ALT) (IU/L)</span>
          <input type="number" name="sgpt" required>
        </label>
        <label class="form-field">
          <span>SGOT (AST) (IU/L)</span>
          <input type="number" name="sgot" required>
        </label>
        <label class="form-field">
          <span>Total Proteins (g/dL)</span>
          <input type="number" step="0.1" name="total_proteins" required>
        </label>
        
        <label class="form-field">
          <span>Albumin (g/dL)</span>
          <input type="number" step="0.1" name="albumin" required>
        </label>
        <label class="form-field">
          <span>Albumin & Globulin Ratio</span>
          <input type="number" step="0.01" name="ag_ratio" required>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Predict Liver Disease Risk</button>
        </div>
      </form>
    </section>

  </div>
</main>

<footer class="footer">
  © 2025 MedAlert AI • Liver Disease Prediction Module
</footer>

</body>
</html>
