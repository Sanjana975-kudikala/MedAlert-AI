<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | MedAlert AI</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="nav">
  <div class="nav-inner">
    <div class="brand">
      <span class="logo">🩺</span>
      <span class="brand-name">MedAlert AI</span>
    </div>

    <a href="{{ url_for('home') }}" class="btn-secondary">
      Back to Home
    </a>
  </div>
</header>

<!-- ================= SIGNUP PAGE ================= -->
<main class="auth-page">

  <!-- BOX WRAPPER (same as login) -->
  <div class="auth-wrapper">

    <section class="auth-card login-card">

      <!-- HEADER -->
      <div class="auth-header">
        <h1>Create Account</h1>
        <p class="section-help">
          Sign up to access disease prediction modules
        </p>
      </div>

      <!-- SIGNUP FORM -->
      <form method="POST" action="/signup" class="auth-form">

        <label class="form-field">
          <span>Full Name</span>
          <input
            type="text"
            name="fullname"
            required
            placeholder="Your full name"
          >
        </label>

        <label class="form-field">
          <span>Email Address</span>
          <input
            type="email"
            name="email"
            required
            placeholder="you@example.com"
          >
        </label>

        <label class="form-field">
          <span>Password</span>
          <input
            type="password"
            name="password"
            required
            placeholder="••••••••"
          >
        </label>

        <label class="form-field">
          <span>Confirm Password</span>
          <input
            type="password"
            name="confirm_password"
            required
            placeholder="••••••••"
          >
        </label>

        <button type="submit" class="btn-primary auth-btn">
          Create Account
        </button>

        <p class="auth-footer-text">
          Already have an account?
          <a href="{{ url_for('loginPage') }}">Login</a>
        </p>

      </form>

    </section>

  </div>
</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  © 2025 MedAlert AI • Secure Account Registration
</footer>

</body>
</html>
